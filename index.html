<!doctype html>
<html lang="en"> <!--문서언어 영어로-->
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/webstorm-icon-logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMC TODO</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body> <!--화면에 보이는 내용-->
  <div class="todo-container"> <!--div말고 section으로도 가능?-->
    <h1 class="todo-container__header">Hyunmin's TODO</h1> <!-- h1:제목-->
    <!-- 할일입력form-->
    <form id="todo-form" class="todo-container__form">
      <!--입력창-->
      <input type="text"
             id="todo-input"
             class="todo-container__input"
             placeholder="할 일을 입력해주세요."
             required/>
      <!-- 추가 버튼-->
      <button type="submit" class="todo-container__button">할일 추가</button>
    </form>
    <!--할 일, 완료 영역-->
    <div class="render-container">
      <!--할 일 목록-->
      <div class="render-container__section">
        <h1 class="render-container__title">할 일</h1>
        <ul id="todo-list" class="render-container__list"> <!--빈리스트고 todoList.appendChild(li)로 채워짐-->
        </ul>
    </div>
      <!-- 완료 목록-->
      <div class="render-container__section">
        <h1 class="render-container__title">완료</h1>
        <ul id="done-list" class="render-container__list">
        </ul>
      </div>
  </div>
  </div>

</body>
<script type="module" src="./dist/script.js" defer></script>
</html>
